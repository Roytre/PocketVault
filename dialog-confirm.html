<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confirm — My Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head><body style="background: hsl(var(--muted));">
<div class="overlay" style="position:relative; min-height:100vh;">
  
<div class="dialog" style="max-width:420px;">
  <div class="dialog-header">
    <div style="width:48px; height:48px; border-radius:50%; background:hsl(var(--destructive) / 0.12); color:hsl(var(--destructive)); display:grid; place-items:center; margin-bottom:0.75rem; font-size:1.5rem;">⚠</div>
    <h2>Delete this item?</h2><p>This action can't be undone. The item and its attachments will be permanently removed.</p>
  </div>
  <div class="dialog-footer">
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-destructive">Delete forever</button>
  </div>
</div>

</div>
</body></html>
