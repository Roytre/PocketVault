<!doctype html>
<html lang="en" class="dark"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password — My Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head><body>
<div class="auth-wrap">
  <div class="auth-canvas"></div>
  <div class="auth-inner">
    <div class="auth-title"><h1>My Pocket Vault</h1></div>
    <div class="auth-card">
      <div class="card-head">
        <div style="display:flex; align-items:center; gap:0.5rem;">
          <a href="auth.html" class="btn ghost icon sm"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class=""><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 19"/></svg></a>
          <h2>Reset password</h2>
        </div>
        <div class="desc">Enter your email and we'll send you a reset link.</div>
      </div>
      <div class="card-body">
        <div class="field"><label class="label">Email</label><input class="input auth-input" placeholder="you@example.com"></div>
        <button class="btn auth-input full" style="border-radius:var(--radius);">Send reset link</button>
      </div>
    </div>
  </div>
</div></body></html>
